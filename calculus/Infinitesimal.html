An <a href="Infinitesimal.html">Infinitesimal</a>, per <a href="https://en.wikipedia.org/wiki/Infinitesimal">
Wikipedia Definition</a>, is "a quantity that is closer to zero than any standard
real number, but is not zero." <p>
In terms of calculation, an <a href="Infinitesimal.html">Infinitesimal</a> can be treated as zero, but can also
be divided (e.g. an <a href="Infinitesimal.html">Infinitesimal</a> divided by itself is 1).
